stage: 2
name: Worldbuilding
description: Translate vision into a lived-in world with characters, environments,
  and sensory reality
inputs_from:
- 1
include_prior_stage_context: true
llm:
  provider: runware
  model: anthropic-claude-opus-4-7
  max_tokens: 4096
phases:
- id: worldbuilding
  name: World Design
  description: "Build the complete world \u2014 bible, characters, environments, sensory\
    \ palette, and visual language"
  mode: parallel
  context_level: disordine
  include_prior_stage_context: true
  checkpoint: true
  experts:
  - id: world_bible_producer
    role: World Bible Producer
    prompt_file: prompts/experts/world_bible_producer.md
  - id: transition_historian
    role: Transition Historian
    prompt_file: prompts/experts/transition_historian.md
  - id: character_architect
    role: Character Architect
    prompt_file: prompts/experts/character_architect.md
  - id: anthropologist_wb
    role: Cultural Anthropologist
    prompt_file: prompts/experts/anthropologist.md
  - id: environment_designer
    role: Environment Designer
    prompt_file: prompts/experts/environment_designer.md
  - id: sensory_designer
    role: Sensory Designer
    prompt_file: prompts/experts/sensory_designer.md
  - id: psychologist
    role: Psychologist
    prompt_file: prompts/experts/psychologist.md
style:
  aesthetic: grounded sci-fi, warm palette, organic architecture
  references: []
  color_palette: []
characters_gen:
  generation:
    tool: runware
    consistency_method: reference_sheet
    views:
    - front
    - three_quarter
    - profile
environments_gen:
  generation:
    tool: runware
    method: tile_and_compose
    layers:
    - background
    - midground
    - foreground
outputs:
- type: vision_consolidation
  phase: worldbuilding
  description: "Brief \xD7 Disordine alignment map, tension resolution, creative north\
    \ star"
- type: world_bible
  phase: worldbuilding
  description: "World bible \u2014 rules, technology, social structures, daily life,\
    \ bridge from today"
- type: lore_report
  phase: worldbuilding
  description: Lore consistency check and Metanoia identity anchors
- type: character_profiles
  phase: characters
  description: Character profiles with motivations, daily lives, relationships
- type: daily_life
  phase: characters
  description: "What a normal Tuesday looks like \u2014 morning to night in sensory\
    \ detail"
- type: environment_specs
  phase: environments
  description: 4-6 key locations with spatial logic and sensory detail
- type: visual_language
  phase: environments
  description: Color palette logic, architectural style, technology aesthetic
checkpoint:
  required: true
  reviewers:
  - nejc
  - dirk
